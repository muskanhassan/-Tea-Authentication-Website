<!DOCTYPE html>
<html lang="en">

<head>
    <title>Register</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container d-flex justify-content-center align-items-center vh-100">

        <div class="card shadow p-4 login-card">

            <h2 class="text-center mb-4">
                Register
            </h2>

            <input type="text" id="name" class="form-control mb-3" placeholder="Enter Name">

            <input type="email" id="registerEmail" class="form-control mb-3" placeholder="Enter Email">

            <input type="password" id="registerPassword" class="form-control mb-3" placeholder="Enter Password">

            <button onclick="registerUser()" class="btn btn-success w-100">
                Register
            </button>

            <div class="text-center mt-3">
                <a href="login.html">
                    Already have account?
                </a>
            </div>

        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
