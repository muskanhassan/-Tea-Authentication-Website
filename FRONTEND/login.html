<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container d-flex justify-content-center align-items-center vh-100">

        <div class="card shadow p-4 login-card">

            <h2 class="text-center mb-4">Login</h2>

            <input type="email" id="email" class="form-control mb-3" placeholder="Enter Email">

            <input type="password" id="password" class="form-control mb-3" placeholder="Enter Password">

            <button onclick="loginUser()" class="btn btn-primary w-100">
                Login
            </button>

            <div class="text-center mt-3">
                <a href="register.html">
                    Create Account
                </a>
            </div>

        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
